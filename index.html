<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Calculadora IR</title>
    <link rel="stylesheet" href="css/calculadora.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/script.js" defer></script>
</head>

<body>
    <header>
        <img src="img/SESI-SENAI-COR-sp-preto-1-.png" alt="Logo SESI">
        <h1>Calculadora Imposto de Renda</h1>
    </header>

    <form onsubmit="calcular(event)">
        <div class="container">
            <div class="infos">
                <div class="card">
                    <h2>Dados</h2>

                    <label>Salário Bruto (R$)</label>
                    <input type="number" id="salario" step="0.01" required>

                    <label>Número de Dependentes</label>
                    <select id="dependentes">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>

                    <br><br>

                    <label>Outras Deduções (R$)</label>
                    <input type="number" id="descontos" step="0.01">

                    <button type="submit">Calcular</button>
                </div>

                <div class="card resultado" id="resultado">
                </div>

            </div>
        </div>
    </form>
    <div class="card">
        <table id="tabela" style="display:none;">
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Valor</th>
                </tr>
            </thead>
            <tbody id="dadosTabela"></tbody>
        </table>
    </div>
    <div class="card2">
        <div class="grafico-container">
            <canvas id="grafico"></canvas>
        </div>
    </div>
    <footer class="footer">
        <img src="img/Captura de tela 2026-04-23 100757.png">
        <p>Trabalho de matemática, feito por: João, Laura, Pedro e Valentina</p>
        <p>Professores responsáveis: Anderson e Valter</p>
    </footer>

</body>

</html>
